name: 每日股票分析

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - market-only
          - stocks-only
      force_run:
        description: '强制运行（跳过交易日检查）'
        required: false
        default: false
        type: boolean

concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - name: 随机延迟
        run: sleep $((RANDOM % 60))
      
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq \
            libfreetype6-dev libpng-dev libjpeg-dev tzdata > /dev/null 2>&1
          mkdir -p ~/.config/matplotlib
          echo "backend: Agg" > ~/.config/matplotlib/matplotlibrc

      - name: 安装依赖
        run: |
          pip config set global.cache-dir ~/.cache/pip
          pip install --upgrade pip
          
          install_with_retry() {
            local max_retries=3
            local retry_count=0
            while [[ $retry_count -lt $max_retries ]]; do
              if pip install --upgrade "$@"; then
                return 0
              fi
              retry_count=$((retry_count + 1))
              echo "⚠️ 重试 $retry_count..."
              sleep 5
            done
            exit 1
          }

          if [[ -f "requirements.txt" ]]; then
            install_with_retry -r requirements.txt
          fi

          echo "📦 安装核心依赖..."
          install_with_retry \
            python-dotenv pillow python-magic \
            google-generativeai openai anthropic \
            langchain langchain-community tavily-python serpapi \
            requests pandas numpy matplotlib seaborn scikit-learn tushare
      
      - name: 创建目录及策略 (确保目录存在)
        run: |
          mkdir -p data logs reports strategies
          # 预创建一个空日志，防止后续步骤报 "No files found"
          touch logs/initialization.log
          echo "初始化完成" >> logs/initialization.log
          
          if [[ ! -f "strategies/moving_average.yml" ]]; then
            cat > strategies/moving_average.yml << EOF
          name: 均线金叉
          indicators: [ma5, ma10, ma20]
          EOF
          fi
      
      - name: 🔍 诊断：查看脚本支持的参数
        run: |
          echo "=========================================="
          echo "🔍 正在探测 main.py 支持的参数..."
          echo "=========================================="
          # 这一步至关重要！它会告诉我们要传什么参数才不会报 exit code 2
          python main.py --help || echo "⚠️ --help 也失败了，说明脚本有严重导入错误"
          echo "=========================================="

      - name: 执行股票分析
        id: run_analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-3-flash-preview' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || '' }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          STOCK_LIST: ${{ vars.STOCK_LIST || '600519' }}
          LOG_LEVEL: DEBUG
          MPLBACKEND: Agg
          TZ: Asia/Shanghai
        run: |
          set -uo pipefail
          
          MODE="${{ github.event.inputs.mode || 'full' }}"
          FORCE_RUN="${{ github.event.inputs.force_run }}"
          
          echo "🚀 开始执行..."
          echo "模式：$MODE"
          echo "强制运行：$FORCE_RUN"
          
          # 构造参数字符串
          ARGS=""
          
          # 根据常见习惯尝试匹配，如果上面的 --help 显示不同，你需要手动修改这里
          if [[ "$MODE" == "market-only" ]]; then
            ARGS="--market-review"
          elif [[ "$MODE" == "stocks-only" ]]; then
            ARGS="--no-market-review"
          else
            ARGS="--run-analysis"
          fi
          
          if [[ "$FORCE_RUN" == "true" ]]; then
            ARGS="$ARGS --force-run"
          fi
          
          echo "📝 最终拼接的参数：[$ARGS]"
          echo "----------------------------------------"
          
          # 【关键策略】使用 eval 执行，确保参数被正确拆分
          # 如果 ARGS 为空，eval python main.py 等同于 python main.py
          if [[ -z "$ARGS" ]]; then
            echo "⚡ 无额外参数，直接运行..."
            python main.py
          else
            echo "⚡ 带参数运行：python main.py $ARGS"
            eval python main.py $ARGS
          fi
          
          EXIT_CODE=$?
          echo "----------------------------------------"
          echo "🏁 执行结束，退出码：$EXIT_CODE"
          
          # 记录退出码到日志文件，方便后续排查
          echo "Script Exit Code: $EXIT_CODE" >> logs/execution_status.log
          
          if [[ $EXIT_CODE -ne 0 ]]; then
            echo "::error::脚本执行失败 (Exit Code $EXIT_CODE)。请查看上方 '诊断：查看脚本支持的参数' 和本步骤的报错详情。"
            # 不要立即 exit 1，让后续步骤有机会上传可能产生的部分日志
            # 但为了让 GitHub Actions 标记为失败，最后还是要退出的
            # 这里我们先标记，在最后一步统一处理或者直接退出
            exit $EXIT_CODE
          fi

      - name: 上传分析报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analysis-reports-${{ github.run_number }}
          path: |
            reports/**
            logs/**
            strategies/**
          retention-days: 7
          # 即使没有报告，只要有日志（我们预创建了）就不会报 No files found
          if-no-files-found: warn 

      - name: 结果摘要
        if: always()
        run: |
          echo "📊 运行摘要"
          ls -la logs/
          if [[ -f "logs/execution_status.log" ]]; then
            cat logs/execution_status.log
          fi
