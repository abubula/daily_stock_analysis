name: 每日股票分析

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - market-only
          - stocks-only
      force_run:
        description: '强制运行（跳过交易日检查）'
        required: false
        default: false
        type: boolean

concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - name: 随机延迟
        run: sleep $((RANDOM % 60))
      
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq \
            libfreetype6-dev libpng-dev libjpeg-dev tzdata > /dev/null 2>&1
          mkdir -p ~/.config/matplotlib
          echo "backend: Agg" > ~/.config/matplotlib/matplotlibrc

      - name: 安装依赖
        run: |
          pip config set global.cache-dir ~/.cache/pip
          pip install --upgrade pip
          
          install_with_retry() {
            local max_retries=3
            local retry_count=0
            while [[ $retry_count -lt $max_retries ]]; do
              if pip install --upgrade "$@"; then
                return 0
              fi
              retry_count=$((retry_count + 1))
              echo "⚠️ 重试 $retry_count..."
              sleep 5
            done
            echo "❌ 依赖安装失败"
            exit 1
          }

          if [[ -f "requirements.txt" ]]; then
            install_with_retry -r requirements.txt
          fi

          echo "📦 安装核心依赖..."
          install_with_retry \
            python-dotenv pillow python-magic \
            google-generativeai openai anthropic \
            langchain langchain-community tavily-python serpapi \
            requests pandas numpy matplotlib seaborn scikit-learn tushare
      
      - name: 创建目录及策略
        run: |
          mkdir -p data logs reports strategies
          if [[ ! -f "strategies/moving_average.yml" ]]; then
            cat > strategies/moving_average.yml << EOF
          name: 均线金叉
          indicators: [ma5, ma10, ma20]
          EOF
          fi
      
      - name: 执行股票分析 (调试增强版)
        id: run_analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-3-flash-preview' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || '' }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          STOCK_LIST: ${{ vars.STOCK_LIST || '600519' }}
          # 补全其他必要环境变量...
          LOG_LEVEL: DEBUG
          MPLBACKEND: Agg
          TZ: Asia/Shanghai
        run: |
          set -uo pipefail
          
          MODE="${{ github.event.inputs.mode || 'full' }}"
          FORCE_RUN="${{ github.event.inputs.force_run }}"
          
          echo "🔍 调试信息:"
          echo "  模式: $MODE"
          echo "  强制运行: $FORCE_RUN"
          
          # 构建参数字符串用于显示
          FINAL_ARGS=""
          
          # 逻辑分支构建参数
          if [[ "$MODE" == "market-only" ]]; then
            FINAL_ARGS="--market-review"
          elif [[ "$MODE" == "stocks-only" ]]; then
            FINAL_ARGS="--no-market-review"
          else
            FINAL_ARGS="--run-analysis"
          fi
          
          if [[ "$FORCE_RUN" == "true" ]]; then
            FINAL_ARGS="$FINAL_ARGS --force-run"
          fi
          
          echo "🚀 即将执行的命令: python main.py $FINAL_ARGS"
          echo "----------------------------------------"
          
          # 【关键修改】直接执行，不再使用数组，而是依靠 Shell 的自然展开
          # 如果 FINAL_ARGS 为空字符串，Shell 通常会正确处理（不传参）
          # 为了绝对安全，我们分情况执行
          
          if [[ -z "$FINAL_ARGS" ]]; then
             echo "⚠️ 无额外参数，直接运行..."
             python main.py
          else
             echo "✅ 带参数运行..."
             # 使用 eval 确保参数被正确解析为多个单词，而不是一个长字符串
             # 注意：eval 需谨慎，但在此处变量来源可控，是解决 argparse 问题的最佳方案
             eval python main.py $FINAL_ARGS
          fi
          
          EXIT_CODE=$?
          echo "----------------------------------------"
          echo "🏁 退出码: $EXIT_CODE"
          
          if [[ $EXIT_CODE -ne 0 ]]; then
            echo "::error::脚本执行失败 (Exit Code $EXIT_CODE)。请向上滚动查看 Python Traceback 报错详情。"
            exit $EXIT_CODE
          fi

      - name: 上传报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reports-${{ github.run_number }}
          path: |
            reports/**
            logs/**
          retention-days: 7
          if-no-files-found: warn

      - name: 结果摘要
        if: always()
        run: |
          echo "📊 运行摘要"
          if [[ -d "reports" ]] && [[ -n "$(ls -A reports 2>/dev/null)" ]]; then
            echo "✅ 报告已生成"
            du -sh reports/
          else
            echo "❌ 无报告生成"
          fi
          
          if [[ -d "logs" ]]; then
            LATEST_LOG=$(find logs -name "*.log" -type f -printf '%T@ %p\n' 2>/dev/null | sort -n | tail -1 | cut -d' ' -f2- || true)
            if [[ -n "$LATEST_LOG" ]]; then
              echo "📋 最后 30 行日志:"
              tail -30 "$LATEST_LOG" 2>/dev/null || echo "日志为空"
            fi
          fi
