name: 每日股票分析

on:
  # 定时触发 - 每天北京时间 18:00 (UTC 10:00)
  schedule:
    - cron: '0 10 * * 1-5'     # 周一到周五，UTC 10:00 = 北京时间 18:00
  
  # 手动触发（带运行模式和强制运行选项）
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full          # 完整分析（股票+大盘）
          - market-only   # 仅大盘复盘
          - stocks-only   # 仅股票分析
      force_run:
        description: '强制运行（跳过交易日检查）'
        required: false
        default: false
        type: boolean

# 并发控制：同一时间只运行一个分析任务
concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    # 超时限制修改为180分钟，防止大任务卡死（符合GitHub最大360分钟限制）
    timeout-minutes: 180
    
    steps:
      - name: 随机延迟（避免固定时间访问数据源）
        run: sleep $((RANDOM % 60))  # 随机延迟0-60秒启动
      
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装系统依赖（适配无GUI环境）
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq \
            libfreetype6-dev libpng-dev libjpeg-dev tzdata > /dev/null 2>&1
          # 配置 matplotlib 非交互后端，避免绘图报错
          mkdir -p ~/.config/matplotlib
          echo "backend: Agg" > ~/.config/matplotlib/matplotlibrc

      - name: 安装依赖（智能重试 + 可见报错 + 缓存优化）
        run: |
          # 配置 pip 缓存
          pip config set global.cache-dir ~/.cache/pip
          pip install --upgrade pip
          
          # 依赖安装重试函数（移除 quiet 以保留错误详情）
          install_with_retry() {
            local max_retries=3
            local retry_count=0
            while [[ $retry_count -lt $max_retries ]]; do
              if pip install --upgrade "$@"; then
                return 0
              fi
              retry_count=$((retry_count + 1))
              echo "⚠️ 依赖安装失败，第 $retry_count 次重试..."
              sleep 5
            done
            echo "❌ 依赖安装失败（重试$max_retries次），请检查上方报错信息"
            exit 1
          }

          # 优先安装用户自定义依赖
          if [[ -f "requirements.txt" ]]; then
            echo "📦 正在安装 requirements.txt..."
            install_with_retry -r requirements.txt
          else
            echo "⚠️ 未找到 requirements.txt，将仅安装兜底依赖"
          fi

          # 兜底安装核心依赖（无版本锁定，自动解决兼容性）
          echo "📦 正在安装核心兜底依赖..."
          install_with_retry \
            python-dotenv pillow python-magic \
            google-generativeai openai anthropic \
            langchain langchain-community tavily-python serpapi \
            requests pandas numpy matplotlib seaborn scikit-learn tushare
      
      - name: 创建必要目录及默认策略
        run: |
          mkdir -p data logs reports strategies
          chmod 755 data logs reports strategies
          
          # 创建默认策略文件（避免分析脚本因无策略文件报错）
          if [[ ! -f "strategies/moving_average.yml" ]]; then
            cat > strategies/moving_average.yml << EOF
          name: 均线金叉
          description: 基于5日/10日/20日均线金叉的买入信号分析
          indicators: [ma5, ma10, ma20]
          conditions:
            - "ma5 > ma10"
            - "ma10 > ma20"
            - "ma5 crosses above ma10"
          EOF
          fi
          if [[ ! -f "strategies/chanlun.yml" ]]; then
            cat > strategies/chanlun.yml << EOF
          name: 缠论
          description: 缠论中枢、背驰、买卖点分析
          indicators: [rsi, macd, volume]
          conditions:
            - "trend: bullish"
            - "divergence: bullish"
          EOF
          fi
      
      - name: 预执行检查
        run: |
          set -e
          if [[ ! -f "main.py" ]]; then
            echo "❌ 核心脚本 main.py 不存在，请检查代码检出是否成功"
            exit 1
          fi
          echo "✅ 核心脚本 main.py 存在"
          # 目录权限由 mkdir 保证，无需额外检查
      
      - name: 执行股票分析
        env:
          # ==========================================
          # AI 配置
          # ==========================================
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || secrets.GEMINI_MODEL || 'gemini-3-flash-preview' }}
          GEMINI_MODEL_FALLBACK: ${{ vars.GEMINI_MODEL_FALLBACK || secrets.GEMINI_MODEL_FALLBACK || 'gemini-2.5-flash' }}
          GEMINI_REQUEST_DELAY: '3.0'
          
          AIHUBMIX_KEY: ${{ secrets.AIHUBMIX_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || secrets.OPENAI_MODEL || 'gpt-4o' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || secrets.ANTHROPIC_MODEL || 'claude-3-5-sonnet-20241022' }}
          
          # ==========================================
          # 数据源与搜索
          # ==========================================
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          BOCHA_API_KEYS: ${{ secrets.BOCHA_API_KEYS }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          SERPAPI_API_KEYS: ${{ secrets.SERPAPI_API_KEYS }}
          
          # ==========================================
          # 通知渠道
          # ==========================================
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          WECHAT_MSG_TYPE: ${{ vars.WECHAT_MSG_TYPE || 'markdown' }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_MESSAGE_THREAD_ID: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}
          EMAIL_SENDER: ${{ vars.EMAIL_SENDER || secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ vars.EMAIL_RECEIVERS || secrets.EMAIL_RECEIVERS }}
          EMAIL_SENDER_NAME: ${{ vars.EMAIL_SENDER_NAME || 'StockAnalysisBot' }}
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          CUSTOM_WEBHOOK_URLS: ${{ secrets.CUSTOM_WEBHOOK_URLS }}
          CUSTOM_WEBHOOK_BEARER_TOKEN: ${{ secrets.CUSTOM_WEBHOOK_BEARER_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_MAIN_CHANNEL_ID: ${{ secrets.DISCORD_MAIN_CHANNEL_ID }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_FOLDER_TOKEN: ${{ secrets.FEISHU_FOLDER_TOKEN }}
          ASTRBOT_URL: ${{ secrets.ASTRBOT_URL }}
          ASTRBOT_TOKEN: ${{ secrets.ASTRBOT_TOKEN }}
          SERVERCHAN3_SENDKEY: ${{ secrets.SERVERCHAN3_SENDKEY }}
          
          # ==========================================
          # 业务与系统配置
          # ==========================================
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST || '600519' }}
          MARKET_REVIEW_REGION: ${{ vars.MARKET_REVIEW_REGION || 'cn' }}
          REPORT_TYPE: ${{ vars.REPORT_TYPE || 'simple' }}
          SINGLE_STOCK_NOTIFY: ${{ vars.SINGLE_STOCK_NOTIFY || 'false' }}
          MARKET_REVIEW_ENABLED: ${{ vars.MARKET_REVIEW_ENABLED || 'true' }}
          ANALYSIS_DELAY: ${{ vars.ANALYSIS_DELAY || '0' }}
          TRADING_DAY_CHECK_ENABLED: ${{ vars.TRADING_DAY_CHECK_ENABLED || 'true' }}
          LOG_LEVEL: INFO
          MAX_WORKERS: ${{ vars.MAX_WORKERS || '1' }}
          ENABLE_CHIP_DISTRIBUTION: 'false'
          REALTIME_SOURCE_PRIORITY: ${{ vars.REALTIME_SOURCE_PRIORITY || 'tencent,akshare_sina,efinance,akshare_em' }}
          MPLBACKEND: Agg
          TZ: Asia/Shanghai
        run: |
          set -euo pipefail
          
          # 1. 关键配置预检
          echo "🔍 开始关键配置检查..."
          if [[ -z "${TUSHARE_TOKEN}" ]]; then
            echo "⚠️ 警告：TUSHARE_TOKEN 未配置，数据获取可能失败"
          fi
          
          # 检查至少一个 AI 密钥
          AI_KEYS=("${GEMINI_API_KEY}" "${OPENAI_API_KEY}" "${ANTHROPIC_API_KEY}" "${AIHUBMIX_KEY}")
          AI_CONFIGURED=false
          for key in "${AI_KEYS[@]}"; do
            if [[ -n "$key" ]]; then
              AI_CONFIGURED=true
              break
            fi
          done
          
          if [[ "$AI_CONFIGURED" = false ]]; then
            echo "❌ 错误：未配置任何 AI 密钥 (Gemini/OpenAI/Anthropic/AIHubMix)，任务终止"
            exit 1
          fi
          echo "✅ AI 密钥检查通过"

          # 2. 模式解析与验证
          MODE="${{ github.event.inputs.mode || 'full' }}"
          case "${MODE}" in
            full|market-only|stocks-only) ;;
            *)
              echo "❌ 错误：无效的运行模式 '${MODE}'，任务终止"
              exit 1
              ;;
          esac
          
          echo "=========================================="
          echo "🚀 A股自选股智能分析系统"
          echo "=========================================="
          echo "⏰ 时间: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "🎯 模式: ${MODE}"
          echo "📊 标的: ${STOCK_LIST}"
          echo ""
          
          # 3. 构建参数
          FORCE_RUN_ARG=""
          if [[ "${{ github.event.inputs.force_run }}" == "true" ]]; then
            FORCE_RUN_ARG="--force-run"
            echo "⚡ 强制运行模式已启用（跳过交易日检查）"
          fi
          
          # 4. 执行主程序（带耗时统计）
          echo "▶️ 开始执行分析..."
          start_time=$(date +%s)
          
          case "${MODE}" in
            market-only)
              python main.py --market-review "${FORCE_RUN_ARG}"
              ;;
            stocks-only)
              python main.py --no-market-review "${FORCE_RUN_ARG}"
              ;;
            full)
              python main.py --run-analysis "${FORCE_RUN_ARG}"
              ;;
          esac
          
          end_time=$(date +%s)
          run_time=$((end_time - start_time))
          echo "✅ 分析脚本执行完成，总耗时: ${run_time} 秒"

      - name: 上传分析报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analysis-reports-${{ github.run_number }}
          path: |
            reports/**
            logs/**
            strategies/**
          retention-days: 30
          if-no-files-found: warn

      - name: 显示运行结果摘要
        if: always()
        run: |
          echo ""
          echo "================================"
          echo "🎯 运行结果检查"
          echo "================================"
          
          # 检查报告
          if [[ -d "reports" ]] && [[ -n "$(ls -A reports 2>/dev/null)" ]]; then
            echo "✅ 报告生成成功:"
            ls -lh reports/ | awk '{print "  " $9 " (" $5 ")"}' | head -10
            report_size=$(du -sh reports/ 2>/dev/null | awk '{print $1}')
            # 【修正点】将中文冒号“：”改为英文冒号“:”
            echo "  📦 报告总大小：${report_size}"
