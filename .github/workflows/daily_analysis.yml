name: 每日股票分析

on:
  # 定时触发 - 每天北京时间 18:00 (UTC 10:00)
  schedule:
    - cron: '0 10 * * 1-5'     # 周一到周五，UTC 10:00 = 北京时间 18:00
  
  # 手动触发（带运行模式和强制运行选项）
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full          # 完整分析（股票+大盘）
          - market-only   # 仅大盘复盘
          - stocks-only   # 仅股票分析
      force_run:
        description: '强制运行（跳过交易日检查）'
        required: false
        default: false
        type: boolean

# 并发控制：同一时间只运行一个分析任务
concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - name: 随机延迟（避免固定时间访问数据源）
        run: sleep $((RANDOM % 60))
      
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          if [[ -f "requirements.txt" ]]; then
            pip install -r requirements.txt
          else
            echo "⚠️ 未找到 requirements.txt，尝试安装基础库..."
            pip install pandas numpy matplotlib requests python-dotenv
          fi
      
      - name: 创建必要目录及预占位文件
        run: |
          mkdir -p data logs reports strategies
          # 【关键优化】预创建日志文件，防止后续上传步骤报 "No files found"
          touch logs/initialization.log
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] 工作流初始化完成" >> logs/initialization.log
          
          # 创建默认策略文件（如果不存在）
          if [[ ! -f "strategies/moving_average.yml" ]]; then
            cat > strategies/moving_average.yml << EOF
          name: 均线金叉
          description: 基于 5 日/10 日/20 日均线金叉
          indicators: [ma5, ma10, ma20]
          conditions: ["ma5 > ma10", "ma10 > ma20"]
          EOF
          fi

      # ==========================================
      # 🔍 新增诊断步骤：查看脚本支持的参数
      # ==========================================
      - name: 🔍 诊断：探测 main.py 支持的参数
        run: |
          echo "=========================================="
          echo "🔍 正在探测 main.py 支持的参数 (--help)..."
          echo "=========================================="
          # 这一步至关重要！它会告诉我们要传什么参数才不会报 exit code 2
          python main.py --help || echo "⚠️ --help 执行失败，脚本可能存在严重导入错误"
          echo "=========================================="
          echo "💡 提示：请对比上方输出与本步骤传入的参数是否一致"
          echo "=========================================="

      - name: 执行股票分析
        id: run_analysis
        env:
          # ==========================================
          # AI 配置 (保留 Grok 的完整配置)
          # ==========================================
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || secrets.GEMINI_MODEL || 'gemini-3-flash-preview' }}
          GEMINI_MODEL_FALLBACK: ${{ vars.GEMINI_MODEL_FALLBACK || secrets.GEMINI_MODEL_FALLBACK || 'gemini-2.5-flash' }}
          GEMINI_REQUEST_DELAY: '3.0'
          
          AIHUBMIX_KEY: ${{ secrets.AIHUBMIX_KEY }}
          
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || secrets.OPENAI_MODEL }}
          
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || secrets.ANTHROPIC_MODEL || 'claude-3-5-sonnet-20241022' }}
          
          # ==========================================
          # 数据源与搜索
          # ==========================================
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          BOCHA_API_KEYS: ${{ secrets.BOCHA_API_KEYS }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          SERPAPI_API_KEYS: ${{ secrets.SERPAPI_API_KEYS }}
          
          # ==========================================
          # 通知渠道 (保留 Grok 的全渠道配置)
          # ==========================================
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          WECHAT_MSG_TYPE: ${{ vars.WECHAT_MSG_TYPE || secrets.WECHAT_MSG_TYPE || 'markdown' }}
          
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_MESSAGE_THREAD_ID: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}
          
          EMAIL_SENDER: ${{ vars.EMAIL_SENDER || secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ vars.EMAIL_RECEIVERS || secrets.EMAIL_RECEIVERS }}
          EMAIL_SENDER_NAME: ${{ vars.EMAIL_SENDER_NAME || secrets.EMAIL_SENDER_NAME || 'daily_stock_analysis' }}
          
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
          
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          
          CUSTOM_WEBHOOK_URLS: ${{ secrets.CUSTOM_WEBHOOK_URLS }}
          CUSTOM_WEBHOOK_BEARER_TOKEN: ${{ secrets.CUSTOM_WEBHOOK_BEARER_TOKEN }}
          
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_MAIN_CHANNEL_ID: ${{ secrets.DISCORD_MAIN_CHANNEL_ID }}
          
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_FOLDER_TOKEN: ${{ secrets.FEISHU_FOLDER_TOKEN }}
          
          ASTRBOT_URL: ${{ secrets.ASTRBOT_URL }}
          ASTRBOT_TOKEN: ${{ secrets.ASTRBOT_TOKEN }}
          
          SERVERCHAN3_SENDKEY: ${{ secrets.SERVERCHAN3_SENDKEY }}
          
          # ==========================================
          # 业务与系统配置
          # ==========================================
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST || '600519' }}
          MARKET_REVIEW_REGION: ${{ vars.MARKET_REVIEW_REGION || secrets.MARKET_REVIEW_REGION || 'cn' }}
          REPORT_TYPE: ${{ vars.REPORT_TYPE || secrets.REPORT_TYPE || 'simple' }}
          SINGLE_STOCK_NOTIFY: ${{ vars.SINGLE_STOCK_NOTIFY || secrets.SINGLE_STOCK_NOTIFY || 'false' }}
          MARKET_REVIEW_ENABLED: ${{ vars.MARKET_REVIEW_ENABLED || secrets.MARKET_REVIEW_ENABLED || 'true' }}
          ANALYSIS_DELAY: ${{ vars.ANALYSIS_DELAY || secrets.ANALYSIS_DELAY || '0' }}
          TRADING_DAY_CHECK_ENABLED: ${{ vars.TRADING_DAY_CHECK_ENABLED || secrets.TRADING_DAY_CHECK_ENABLED || 'true' }}
          
          LOG_LEVEL: INFO
          MAX_WORKERS: ${{ vars.MAX_WORKERS || secrets.MAX_WORKERS || '1' }}
          ENABLE_CHIP_DISTRIBUTION: 'false'
          REALTIME_SOURCE_PRIORITY: ${{ vars.REALTIME_SOURCE_PRIORITY || 'tencent,akshare_sina,efinance,akshare_em' }}
          MPLBACKEND: Agg
          TZ: Asia/Shanghai

        run: |
          set -uo pipefail
          
          MODE="${{ github.event.inputs.mode || 'full' }}"
          FORCE_RUN_INPUT="${{ github.event.inputs.force_run }}"
          
          echo "=========================================="
          echo "🚀 A股自选股智能分析系统"
          echo "=========================================="
          echo "⏰ 时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "🎯 运行模式: ${MODE}"
          echo "📊 自选股: ${STOCK_LIST}"
          echo "📝 报告类型: ${REPORT_TYPE}"
          echo ""
          
          # ==========================================
          # 【核心优化】安全构建命令行参数
          # ==========================================
          # 使用数组存储参数，避免空字符串问题
          CMD_ARGS=()
          
          # 1. 处理模式参数
          case "${MODE}" in
            market-only)
              CMD_ARGS+=("--market-review")
              echo "✅ 模式设定：仅大盘复盘"
              ;;
            stocks-only)
              CMD_ARGS+=("--no-market-review")
              echo "✅ 模式设定：仅股票分析"
              ;;
            *)
              # 默认模式通常不需要额外参数，或者根据 --help 结果调整
              # 如果 main.py 默认就是全量分析，这里可以不加参数
              # 如果 main.py 需要显式指定，请在这里添加，例如：CMD_ARGS+=("--run-analysis")
              echo "✅ 模式设定：完整分析 (默认)"
              ;;
          esac
          
          # 2. 处理强制运行参数
          if [[ "${FORCE_RUN_INPUT}" == "true" ]]; then
            CMD_ARGS+=("--force-run")
            echo "⚡ 已启用：强制运行模式"
          fi
          
          echo ""
          echo "📋 构造的最终命令参数: ${CMD_ARGS[*]}"
          echo "----------------------------------------"
          
          # 3. 执行脚本
          # 使用 eval 确保参数被正确拆分传递给 python
          if [[ ${#CMD_ARGS[@]} -eq 0 ]]; then
            echo "⚡ 无额外参数，直接运行: python main.py"
            python main.py
          else
            echo "⚡ 带参数运行: python main.py ${CMD_ARGS[*]}"
            # 安全展开数组
            eval python main.py "${CMD_ARGS[*]}"
          fi
          
          EXIT_CODE=$?
          echo "----------------------------------------"
          echo "🏁 脚本执行结束 | 退出码：$EXIT_CODE"
          
          # 记录状态到日志
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] Script Exit Code: $EXIT_CODE" >> logs/execution_status.log
          
          if [[ $EXIT_CODE -ne 0 ]]; then
            echo "::error::分析脚本执行失败 (Exit Code $EXIT_CODE)。请查看上方 '诊断' 步骤及本步骤的详细报错。"
            exit $EXIT_CODE
          fi

      - name: 上传分析报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analysis-reports-${{ github.run_number }}
          path: |
            reports/**
            logs/**
            strategies/**
          retention-days: 30
          if-no-files-found: warn

      - name: 显示运行结果摘要
        if: always()
        run: |
          echo ""
          echo "================================"
          echo "🎯 运行结果检查"
          echo "================================"
          
          # 检查报告
          if [[ -d "reports" && -n "$(ls -A reports 2>/dev/null)" ]]; then
            echo "✅ 分析报告生成成功:"
            ls -lh reports/ | awk '{print "  " $9 " (" $5 ")"}' | head -5
            report_size=$(du -sh reports/ 2>/dev/null | awk '{print $1}')
            echo "  📦 报告总大小：${report_size}"
          else
            echo "❌ 未生成任何分析报告"
          fi
          
          # 检查日志 (增强容错性)
          if [[ -d "logs" ]]; then
            # 查找最新的 .log 文件
            LATEST_LOG=$(find logs -name "*.log" -type f -printf '%T@ %p\n' 2>/dev/null | sort -n | tail -1 | cut -d' ' -f2- || true)
            
            if [[ -n "${LATEST_LOG}" && -f "${LATEST_LOG}" ]]; then
              echo -e "\n📋 最新日志 (${LATEST_LOG}) 末尾 50 行:"
              echo "----------------------------------------"
              tail -50 "${LATEST_LOG}" 2>/dev/null || echo "(无法读取日志内容)"
              echo "----------------------------------------"
            else
              echo "📋 日志目录存在但未找到 .log 文件"
            fi
          else
            echo "📋 日志目录不存在"
          fi
          echo "================================"
